<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Nexus Platform - Discovery">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Nexus">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Nexus</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // Force unregister service workers to avoid stale cache issues
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
    }

    // FIX: Intercept fetch for Service Worker to force correct path
    const originalFetch = window.fetch;
    window.fetch = function(input, init) {
      if (typeof input === 'string' && input.includes('firebase-messaging-sw.js') && !input.includes('madiyar-nexus-01')) {
        console.log('Intercepted fetch:', input);
        input = '/madiyar-nexus-01/firebase-messaging-sw.js';
      }
      return originalFetch.call(this, input, init);
    };

    // FIX: Intercept Service Worker registration to force correct GitHub Pages subfolder path
    if ('serviceWorker' in navigator) {
      const originalRegister = navigator.serviceWorker.register;
      navigator.serviceWorker.register = function(url, options) {
        if (typeof url === 'string' && url.includes('firebase-messaging-sw.js')) {
          console.log('Intercepted Firebase SW registration:', url);
          // Force the correct path for GitHub Pages
          url = '/madiyar-nexus-01/firebase-messaging-sw.js';
          if (options) {
             options.scope = '/madiyar-nexus-01/';
          } else {
             options = { scope: '/madiyar-nexus-01/' };
          }
          console.log('Redirected to:', url);
        }
        return originalRegister.call(this, url, options);
      };
    }
  </script>

  <style>
    body {
      background: #ffffff !important;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: #ffffff;
    }
    flutter-view {
      background: #ffffff !important;
    }
  </style>
</head>
<body>
  <div id="bg-layer"></div>
  <div id="flutter_host"></div>
  
  <script src="flutter_bootstrap.js" async></script>
  
  <script>
    window.addEventListener('load', function(ev) {
      setInterval(() => {
        var fltView = document.querySelector('flutter-view');
        if (fltView) {
          fltView.style.background = 'transparent';
        }
      }, 500);
    });
  </script>
</body>
</html>
