<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Nexus Platform - Discovery">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Nexus">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Nexus</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // FIX: Intercept fetch for Service Worker to force correct path
    const originalFetch = window.fetch;
    window.fetch = function(input, init) {
      if (typeof input === 'string' && input.includes('firebase-messaging-sw.js') && !input.includes('madibook01')) {
        console.log('Intercepted fetch:', input);
        input = '/madibook01/firebase-messaging-sw.js';
      }
      return originalFetch.call(this, input, init);
    };

    // FIX: Intercept Service Worker registration to force correct GitHub Pages subfolder path
    if ('serviceWorker' in navigator) {
      const originalRegister = navigator.serviceWorker.register;
      navigator.serviceWorker.register = function(url, options) {
        if (typeof url === 'string' && url.includes('firebase-messaging-sw.js')) {
          console.log('Intercepted Firebase SW registration:', url);
          // Force the correct path for GitHub Pages
          url = '/madibook01/firebase-messaging-sw.js';
          if (options) {
             options.scope = '/madibook01/';
          } else {
             options = { scope: '/madibook01/' };
          }
          console.log('Redirected to:', url);
        }
        return originalRegister.call(this, url, options);
      };
    }
  </script>

  <style>
    body {
      background: transparent !important;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: url("kaneki.jpg") no-repeat center center fixed;
      background-size: cover;
    }
    flutter-view {
      background: transparent !important;
    }
  </style>
</head>
<body>
  <div id="bg-layer"></div>
  <div id="flutter_host"></div>
  
  <script src="flutter_bootstrap.js" async></script>
  
  <script>
    window.addEventListener('load', function(ev) {
      // Plan "Last Hero" - Injector Script to enforce transparent background
      setInterval(() => {
        var fltView = document.querySelector('flutter-view');
        if (fltView) {
          fltView.style.background = 'transparent';
          // Force body background as well
          document.body.style.background = 'url("kaneki.jpg") no-repeat center center fixed';
          document.body.style.backgroundSize = 'cover';
        }
      }, 500); // 500ms for faster detection
    });
  </script>
</body>
</html>
