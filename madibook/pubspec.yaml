name: nexus
description: "Nexus — A global peer-to-peer skill-sharing platform. Human Library powered by Madi-Credits."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  uuid: ^4.4.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  http: ^1.6.0
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  image_picker: ^1.0.7
  agora_rtc_engine: ^6.5.4
  permission_handler: ^12.0.1
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^8.2.0
  overlay_support: ^2.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/hq720.jpg
    - assets/images/kaneki_v2.jpg
    - assets/images/backgrounds/bg_main.png
    - assets/images/backgrounds/bg_chat.png
    - assets/images/backgrounds/bg_profile.png